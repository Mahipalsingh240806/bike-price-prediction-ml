<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Price Prediction</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        header {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2em;
        }

        main {
            padding: 20px;
            width: 50%;
            margin: 0 auto;
        }

        .form-container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            background: white;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #3e8e41;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

<header>
    <h1>Bike Price Prediction</h1>
</header>

<main>

    <section class="form-container">

        <h3>Enter Bike Details</h3>

        <form action="{{ url_for('project') }}" method="POST">

            <label>Brand:</label>
            <select name="brand_name" required>
                <option value="Royal Enfield">Royal Enfield</option>
                <option value="KTM">KTM</option>
                <option value="Bajaj">Bajaj</option>
                <option value="Harley-Davidson">Harley-Davidson</option>
                <option value="Yamaha">Yamaha</option>
                <option value="Honda">Honda</option>
                <option value="Suzuki">Suzuki</option>
                <option value="TVS">TVS</option>
                <option value="Kawasaki">Kawasaki</option>
                <option value="Hyosung">Hyosung</option>
                <option value="Benelli">Benelli</option>
                <option value="Mahindra">Mahindra</option>
                <option value="Triumph">Triumph</option>
                <option value="Ducati">Ducati</option>
                <option value="BMW">BMW</option>
                <option value="Rajdoot">Rajdoot</option>
                <option value="Indian">Indian</option>
                <option value="LML">LML</option>
                <option value="Yezdi">Yezdi</option>
                <option value="MV">MV</option>
                <option value="Ideal">Ideal</option>
            </select>

            <label>Owner:</label>
            <select name="owner" required>
                <option value="1">First Owner</option>
                <option value="2">Second Owner</option>
                <option value="3">Third Owner</option>
                <option value="4">Fourth Owner</option>
            </select>

            <label>Age:</label>
            <input type="number" name="age" required>

            <label>Power (CC):</label>
            <input type="number" name="power" required>

            <label>KMs Driven:</label>
            <input type="number" name="kms_driven" required>

            <button type="submit">Predict Price</button>

        </form>

    </section>

    {% if prediction %}
    <div class="result">
        Bike Price is: ₹ {{ prediction }}
    </div>
    {% endif %}

</main>

</body>
</html>
